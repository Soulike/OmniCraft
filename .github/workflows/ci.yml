name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - apps/backend/**
              - packages/**
              - configs/**
              - .github/**
              - bun.lock
              - package.json
            frontend:
              - apps/frontend/**
              - packages/**
              - configs/**
              - .github/**
              - bun.lock
              - package.json

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup

      - name: Format check
        run: bun run format:check

      - name: Lint backend
        run: bun run --filter '@omnicraft/backend' lint

      - name: Lint frontend
        run: bun run --filter '@omnicraft/frontend' lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup

      - name: Typecheck all workspaces
        run: bun run --filter '*' --if-present typecheck

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup

      - name: Typecheck
        run: bun run --filter '@omnicraft/backend' typecheck

      - name: Test
        run: bun run --filter '@omnicraft/backend' test

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup

      - name: Typecheck & Build
        run: bun run --filter '@omnicraft/frontend' build

      - name: Test
        run: bun run --filter '@omnicraft/frontend' test

  result:
    name: CI Result
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, lint-format, typecheck, backend, frontend]
    steps:
      - name: Check results
        run: |
          if [[ "$CHANGES" == "failure" || "$CHANGES" == "cancelled" || "$LINT_FORMAT" == "failure" || "$LINT_FORMAT" == "cancelled" || "$TYPECHECK" == "failure" || "$TYPECHECK" == "cancelled" || "$BACKEND" == "failure" || "$BACKEND" == "cancelled" || "$FRONTEND" == "failure" || "$FRONTEND" == "cancelled" ]]; then
            echo "CI failed."
            exit 1
          fi
        env:
          CHANGES: ${{ needs.changes.result }}
          LINT_FORMAT: ${{ needs.lint-format.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          BACKEND: ${{ needs.backend.result }}
          FRONTEND: ${{ needs.frontend.result }}
