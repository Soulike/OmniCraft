name: AI Review

on:
  pull_request:

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REVIEWER_MODELS: ${{ vars.AI_REVIEW_REVIEWER_MODELS || 'gpt-5.5,claude-opus-4.8' }}
  CONFIRM_MODEL: ${{ vars.AI_REVIEW_CONFIRM_MODEL || 'claude-opus-4.8' }}
  REASONING_EFFORT: ${{ vars.AI_REVIEW_EFFORT || 'xhigh' }}

jobs:
  config:
    name: Validate config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      reviewer_models_json: ${{ steps.check.outputs.reviewer_models_json }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Check config
        id: check
        run: bun scripts/src/ai-review/check-config.ts
        env:
          COPILOT_CLI_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}

  prepare:
    name: Resolve review range
    needs: config
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr_number: ${{ steps.range.outputs.pr_number }}
      head_sha: ${{ steps.range.outputs.head_sha }}
      has_changes: ${{ steps.range.outputs.has_changes }}
      carried_verdict: ${{ steps.range.outputs.carried_verdict }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Resolve range
        id: range
        run: bun scripts/src/ai-review/resolve-range.ts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      - name: Upload known issues
        uses: actions/upload-artifact@v7
        with:
          name: known-issues
          path: ${{ steps.range.outputs.known_issues_file }}
          if-no-files-found: error

  review:
    name: Review (${{ matrix.model }} / ${{ matrix.pass }})
    needs: [config, prepare]
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJSON(needs.config.outputs.reviewer_models_json) }}
        pass: [general, security]
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          path: pr-head
          fetch-depth: 0
      - name: Fetch base for diff range
        run: git -C pr-head fetch --no-tags origin -- "${BASE_REF}"
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
      - name: Install deps in pr-head
        run: bun install --frozen-lockfile
        working-directory: pr-head
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
      - name: Download known issues
        uses: actions/download-artifact@v8
        with:
          name: known-issues
          path: known-issues-dir
      - name: Review pass
        run: |
          KNOWN="$(cat known-issues-dir/known-issues.md)"
          PROMPT="$(cat "$GITHUB_WORKSPACE/scripts/src/ai-review/prompts/review-$PASS.md")

          Repository: $GH_REPO
          PR number: $PR_NUMBER
          Review the full diff of this PR against its base: run
          \`git diff $BASE_SHA...HEAD\` (three-dot) inside pr-head.

          Issues already raised on this PR and still open (do NOT re-report these):
          $KNOWN

          Report file: $REPORT_FILE"
          copilot --model "$MODEL" --effort "$REASONING_EFFORT" \
            --context long_context \
            --allow-tool 'shell,read,write' \
            --allow-all-urls \
            --secret-env-vars COPILOT_GITHUB_TOKEN \
            --add-dir "$GITHUB_WORKSPACE" \
            -C pr-head \
            -p "$PROMPT"
          if [ ! -s "$REPORT_FILE" ]; then
            echo "::error::Reviewer did not write a non-empty report to $REPORT_FILE"
            exit 1
          fi
        env:
          MODEL: ${{ matrix.model }}
          PASS: ${{ matrix.pass }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REPORT_FILE: ${{ github.workspace }}/report-${{ matrix.model }}-${{ matrix.pass }}.md
      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: reports-${{ matrix.model }}-${{ matrix.pass }}
          path: report-${{ matrix.model }}-${{ matrix.pass }}.md
          if-no-files-found: error

  confirm:
    name: Confirm & post review
    needs: [config, prepare, review]
    if: needs.prepare.outputs.has_changes == 'true' && needs.review.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          path: pr-head
          fetch-depth: 0
      - name: Install deps in pr-head
        run: bun install --frozen-lockfile
        working-directory: pr-head
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
      - name: Download reports
        uses: actions/download-artifact@v8
        with:
          pattern: reports-*
          path: reports
          merge-multiple: true
      - name: Confirm and post
        run: |
          PROMPT="$(cat "$GITHUB_WORKSPACE/scripts/src/ai-review/prompts/confirm.md")

          Repository: $GH_REPO
          PR number: $PR_NUMBER
          Head SHA: $HEAD_SHA
          Reviewed range: full PR diff ($BASE_SHA...HEAD)
          Reviewer reports are in the reports/ directory."
          copilot --model "$CONFIRM_MODEL" --effort "$REASONING_EFFORT" \
            --context long_context \
            --allow-tool 'shell,read,write' \
            --allow-all-urls \
            --secret-env-vars COPILOT_GITHUB_TOKEN \
            --add-dir "$GITHUB_WORKSPACE" \
            -C pr-head \
            -p "$PROMPT"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

  gate:
    name: AI Review Gate
    needs: [config, prepare, review, confirm]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Read posted verdict
        id: verdict
        if: needs.prepare.outputs.has_changes == 'true' && needs.confirm.result == 'success'
        run: bun scripts/src/ai-review/read-verdict.ts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
      - name: Decide gate
        run: bun scripts/src/ai-review/gate.ts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          CONFIG_RESULT: ${{ needs.config.result }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          REVIEW_RESULT: ${{ needs.review.result }}
          CONFIRM_RESULT: ${{ needs.confirm.result }}
          HAS_CHANGES: ${{ needs.prepare.outputs.has_changes }}
          CARRIED_VERDICT: ${{ needs.prepare.outputs.carried_verdict }}
          POSTED_VERDICT: ${{ steps.verdict.outputs.verdict }}
