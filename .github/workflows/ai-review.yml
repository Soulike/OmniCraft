name: AI Review

on:
  pull_request:

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  GENERAL_MODELS: ${{ vars.AI_REVIEW_GENERAL_MODELS || 'gpt-5.5,claude-opus-4.8' }}
  SECURITY_MODELS: ${{ vars.AI_REVIEW_SECURITY_MODELS || 'gpt-5.5,claude-opus-4.8' }}
  CONFIRM_MODEL: ${{ vars.AI_REVIEW_CONFIRM_MODEL || 'claude-opus-4.8' }}
  GENERAL_EFFORT: ${{ vars.AI_REVIEW_GENERAL_EFFORT || 'xhigh' }}
  SECURITY_EFFORT: ${{ vars.AI_REVIEW_SECURITY_EFFORT || 'xhigh' }}
  CONFIRM_EFFORT: ${{ vars.AI_REVIEW_CONFIRM_EFFORT || 'xhigh' }}

jobs:
  config:
    name: Validate config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      general_models_json: ${{ steps.check.outputs.general_models_json }}
      security_models_json: ${{ steps.check.outputs.security_models_json }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Check config
        id: check
        run: bun scripts/src/ai-review/check-config.ts
        env:
          COPILOT_CLI_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}

  prepare:
    name: Resolve review range
    needs: config
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr_number: ${{ steps.range.outputs.pr_number }}
      head_sha: ${{ steps.range.outputs.head_sha }}
      has_changes: ${{ steps.range.outputs.has_changes }}
      carried_verdict: ${{ steps.range.outputs.carried_verdict }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Resolve range
        id: range
        run: bun scripts/src/ai-review/resolve-range.ts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  general-review:
    name: General review (${{ matrix.model }})
    needs: [config, prepare]
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJSON(needs.config.outputs.general_models_json) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/run-review-pass
        with:
          model: ${{ matrix.model }}
          effort: ${{ env.GENERAL_EFFORT }}
          pass: general
          head-sha: ${{ needs.prepare.outputs.head_sha }}
          base-sha: ${{ github.event.pull_request.base.sha }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          pr-number: ${{ needs.prepare.outputs.pr_number }}
          repo: ${{ github.repository }}
          github-token: ${{ github.token }}
          copilot-token: ${{ secrets.COPILOT_CLI_TOKEN }}

  security-review:
    name: Security review (${{ matrix.model }})
    needs: [config, prepare]
    if: needs.prepare.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJSON(needs.config.outputs.security_models_json) }}
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/run-review-pass
        with:
          model: ${{ matrix.model }}
          effort: ${{ env.SECURITY_EFFORT }}
          pass: security
          head-sha: ${{ needs.prepare.outputs.head_sha }}
          base-sha: ${{ github.event.pull_request.base.sha }}
          base-ref: ${{ github.event.pull_request.base.ref }}
          pr-number: ${{ needs.prepare.outputs.pr_number }}
          repo: ${{ github.repository }}
          github-token: ${{ github.token }}
          copilot-token: ${{ secrets.COPILOT_CLI_TOKEN }}

  confirm:
    name: Confirm & post review
    needs: [config, prepare, general-review, security-review]
    if: needs.prepare.outputs.has_changes == 'true' && needs.general-review.result == 'success' && needs.security-review.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          path: pr-head
          fetch-depth: 0
      - name: Fetch base for diff range
        run: git -C pr-head fetch --no-tags origin -- "${BASE_REF}"
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
      - name: Install deps in pr-head
        run: bun install --frozen-lockfile
        working-directory: pr-head
      - name: Install Copilot CLI
        run: npm install -g @github/copilot
      - name: Download reports
        uses: actions/download-artifact@v8
        with:
          pattern: reports-*
          path: reports
          merge-multiple: true
      - name: Confirm and post
        run: |
          PROMPT="$(cat "$GITHUB_WORKSPACE/scripts/src/ai-review/prompts/confirm.md")

          Repository: $GH_REPO
          PR number: $PR_NUMBER
          Head SHA: $HEAD_SHA
          Reviewed range: full PR diff ($BASE_SHA...HEAD)
          Reviewer reports are in the $GITHUB_WORKSPACE/reports/ directory."
          copilot --model "$CONFIRM_MODEL" --effort "$CONFIRM_EFFORT" \
            --context long_context \
            --allow-tool 'shell,read,write' \
            --allow-all-urls \
            --secret-env-vars COPILOT_GITHUB_TOKEN \
            --add-dir "$GITHUB_WORKSPACE" \
            -C pr-head \
            -p "$PROMPT"
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}

  gate:
    name: AI Review Gate
    needs: [config, prepare, general-review, security-review, confirm]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Read posted verdict
        id: verdict
        if: needs.prepare.outputs.has_changes == 'true' && needs.confirm.result == 'success'
        run: bun scripts/src/ai-review/read-verdict.ts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
      - name: Decide gate
        run: bun scripts/src/ai-review/gate.ts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          CONFIG_RESULT: ${{ needs.config.result }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          GENERAL_REVIEW_RESULT: ${{ needs.general-review.result }}
          SECURITY_REVIEW_RESULT: ${{ needs.security-review.result }}
          CONFIRM_RESULT: ${{ needs.confirm.result }}
          HAS_CHANGES: ${{ needs.prepare.outputs.has_changes }}
          CARRIED_VERDICT: ${{ needs.prepare.outputs.carried_verdict }}
          POSTED_VERDICT: ${{ steps.verdict.outputs.verdict }}
